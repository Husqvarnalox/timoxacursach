services:
  db:
    image: postgres:16-alpine
    container_name: korochki_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: korochki
      POSTGRES_PASSWORD: korochki_pass
      POSTGRES_DB: korochki
    ports:
      - "5432:5432"
    volumes:
      - korochki_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  korochki_data:
