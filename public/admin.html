<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корочки.есть — панель администратора</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1>Корочки.есть — Администратор</h1>
        <nav>
            <a href="#" id="logout">Выйти</a>
        </nav>
    </header>
    <main>
        <div class="card">
            <h2>Все заявки</h2>
            <table id="apps-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Пользователь</th>
                        <th>Контакты</th>
                        <th>Курс</th>
                        <th>Дата начала</th>
                        <th>Оплата</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="apps-body"></tbody>
            </table>
            <div id="empty" class="muted" style="display:none">Заявок нет.</div>
            <div id="msg" class="msg"></div>
        </div>
    </main>
    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
